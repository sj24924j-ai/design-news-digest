name: Daily News Fetch

on:
  schedule:
    # 05:30 JST (20:30 UTC) に毎日実行。スケジュール実行には数分〜十数分の遅延が生じることがあるため、
    # 「毎朝6:00までに反映」という要件に対して余裕を持たせている。
    - cron: "30 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch news
        run: python scripts/fetch_news.py

      - name: Commit data updates
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data
          if git diff --cached --quiet; then
            echo "No data changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update news data ($(date -u +%Y-%m-%d))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # GITHUB_TOKENでのpushは push イベントの自動トリガーを発火しない仕様のため、
      # データ更新があった場合のみ明示的にPagesデプロイを起動する。
      - name: Trigger Pages redeploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --repo "${{ github.repository }}" --ref "${{ github.ref_name }}"
